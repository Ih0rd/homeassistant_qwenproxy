name: "Qwen OAuth Proxy"
description: "OpenAI-compatible proxy для portal.qwen.ai через OAuth токен."
version: "0.0.1"
slug: qwen_proxy
init: false
homeassistant_api: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
ports:
  8080/tcp: 8080
ports_description:
  8080/tcp: "OpenAI-compatible API endpoint"
options:
  access_token: ""
  refresh_token: ""
  expiry_date: 0
  default_model: "qwen3-coder-plus"
schema:
  access_token: str
  refresh_token: str
  expiry_date: int
  default_model: str
